parameters:
  twig.theme: 'adminlte'

  twig.cache.dir: '%kernel.directory.cache%/%kernel.environment%/twig'

  twig.paths:
    app:    '%kernel.directory.root%/templates/%twig.theme%/app'
    common: '%kernel.directory.root%/templates/%twig.theme%/common'
    layout: '%kernel.directory.root%/templates/%twig.theme%/layout'
    macro:  '%kernel.directory.root%/templates/%twig.theme%/macro'
    mail:   '%kernel.directory.root%/templates/%twig.theme%/mail'

services:

  _defaults:
    autowire: true

  Twig\Loader\FilesystemLoader: ~

  Twig\Environment:
    arguments:
      $loader: '@Twig\Loader\FilesystemLoader'
      $options:
        cache: '%twig.cache.dir%'
        debug: '%kernel.debug%'

  twig:
    alias: 'Twig\Environment'

  Application\Service\Twig\TwigConfigurator:
    arguments:
      $twigPaths:       '%twig.paths%'

  Application\Service\Twig\TwigHelper:
    arguments:
      $webAssetsPath:   '%app.public.assets.path%'

  Application\Service\Twig\TwigCacheWarmer:
    tags:
      - { name: 'kernel.cache_warmer', priority: 0 }
